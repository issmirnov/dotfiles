- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- shell:
    - [i3/genconf, "Generating i3 config"]

- link:
    ~/.Xresources: x/Xresources
    ~/.config/alacritty: alacritty
    ~/.config/espanso: espanso
    ~/.config/fontconfig/fonts.conf: fonts/fonts.conf
    ~/.config/gammastep: gammastep
    ~/.config/greenclip.toml: greenclip/greenclip.toml
    ~/.config/onagre: onagre
    ~/.config/rofi: rofi
    ~/.config/hypr: hypr
    ~/.config/terminator/config: terminator/config
    ~/.config/user-dirs.conf: xdg/user-dirs.conf
    ~/.config/waybar: waybar
    ~/.fonts/Font-Awesome-7-Brands-Regular-400.otf: fonts/Font-Awesome-7-Brands-Regular-400.otf
    ~/.fonts/Font-Awesome-7-Free-Regular-400.otf: fonts/Font-Awesome-7-Free-Regular-400.otf
    ~/.fonts/Font-Awesome-7-Free-Solid-900.otf: fonts/Font-Awesome-7-Free-Solid-900.otf
    ~/.fonts/Inconsolata-Regular.ttf: fonts/Inconsolata-Regular.ttf
    ~/.fonts/NotoColorEmoji.ttf: fonts/NotoColorEmoji.ttf
    ~/.fonts/SourceCodePro-Regular.otf: fonts/SourceCodePro-Regular.otf
    ~/.i3/config: i3/config
    ~/.i3blocks.conf: i3/i3blocks.conf
    ~/.xbindkeysrc: xbindkeys/xbindkeysrc
    ~/bin/hop: i3/scripts/hop
    ~/bin/i3_switch_workspace.sh: i3/scripts/i3_switch_workspace.sh


- shell:
    # Rebuild ALL font caches, not just ~/.fonts: the Noto Color Emoji scan-strip in
    # fonts/fonts.conf must also apply to the system copy (/usr/share/fonts/noto, from
    # noto-fonts-emoji) or that copy keeps space/digits and the word-gaps persist.
    - ['([ -x "$(command -v fc-cache)" ] && fc-cache -f -v) || echo "no fc-cache command"', "Regenerate all font caches."]
